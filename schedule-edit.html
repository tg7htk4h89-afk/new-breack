<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A2E5A">
<title>KIB WFM — Schedule Editor</title>
<link rel="stylesheet" href="css/kib.css">
<style>
body { background:#F0F5FB; }

/* toolbar */
.ed-bar {
  position: sticky;
  top: var(--topbar-h, 56px);
  z-index: 50;
  background: #fff;
  border-bottom: 2px solid #E0EAF8;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.wk-btn {
  width: 32px; height: 32px;
  border: 1.5px solid #D1DCF0;
  border-radius: 8px;
  background: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; color: #0A2E5A;
  flex-shrink: 0;
}
.wk-btn:hover { background: #EEF4FC; }
.wk-lbl {
  font-size: 12px; font-weight: 800; color: #0A2E5A;
  min-width: 120px; text-align: center; flex-shrink: 0;
}
.tc {
  padding: 5px 10px;
  border-radius: 20px;
  border: 1.5px solid #D1DCF0;
  background: #fff;
  font-size: 11px; font-weight: 700; color: #5A6E8A;
  cursor: pointer; white-space: nowrap;
  transition: .12s; flex-shrink: 0;
}
.tc.on { background: #0A2E5A; border-color: #0A2E5A; color: #fff; }
.tc-wrap { display:flex; gap:5px; overflow-x:auto; scrollbar-width:none; flex:1; }
.tc-wrap::-webkit-scrollbar { display:none; }

/* grid */
.g-wrap {
  overflow: auto;
  margin: 10px 10px 80px;
  border-radius: 12px;
  border: 1.5px solid #D8E5F5;
  background: #fff;
  box-shadow: 0 4px 20px rgba(10,46,90,.08);
}
.g-tbl {
  border-collapse: separate;
  border-spacing: 0;
  width: max-content;
  min-width: 100%;
}
.g-tbl thead th {
  position: sticky; top: 0; z-index: 12;
  background: #0A2E5A;
  color: rgba(255,255,255,.65);
  padding: 6px 4px;
  font-size: 9px; font-weight: 700;
  text-align: center; white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,.06);
  min-width: 90px;
  line-height: 1.4;
}
.g-tbl thead th.th-name {
  position: sticky; left: 0; z-index: 22;
  text-align: left; padding-left: 12px;
  min-width: 160px; width: 160px;
  border-right: 2px solid rgba(255,255,255,.12);
}
.g-tbl thead th.th-today { background: #00A89A; color: #fff; }
.g-tbl thead th.th-wknd  { background: #0C2345; color: rgba(255,255,255,.3); }

.g-tbl td {
  border-right: 1px solid #EDF2FA;
  border-bottom: 1px solid #EDF2FA;
  height: 44px; padding: 0;
}
.g-tbl .td-name {
  position: sticky; left: 0; z-index: 5;
  background: #fff;
  border-right: 2px solid #E0EAF8;
  padding: 5px 10px;
  white-space: nowrap;
  min-width: 160px; width: 160px;
}
.g-tbl tr:hover td { background: rgba(10,46,90,.02); }
.g-tbl tr:hover .td-name { background: #F5F9FF; }
.grp-row td {
  background: #EEF4FC !important;
  font-size: 10px; font-weight: 800; color: #1A3F70;
  text-transform: uppercase; letter-spacing: .6px;
  padding: 3px 12px; height: 26px !important;
  border-bottom: 1px solid #D8E5F5;
}

/* THE KEY: inline select inside each cell */
.cell-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 3px;
}
.cell-sel {
  width: 86px;
  height: 34px;
  border: none;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 800;
  text-align: center;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  padding: 0 4px;
  transition: box-shadow .15s, transform .1s;
}
.cell-sel:focus {
  box-shadow: 0 0 0 2.5px #0A2E5A;
  transform: scale(1.05);
  z-index: 10;
  position: relative;
}
.cell-sel.changed {
  box-shadow: 0 0 0 2.5px #F59E0B;
}
.cell-sel.today-bg { background: rgba(0,168,154,.08) !important; }

/* save bar */
.save-bar {
  position: fixed;
  bottom: calc(var(--nav-h, 64px) + env(safe-area-inset-bottom,0px) + 4px);
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: #0A2E5A;
  color: #fff;
  padding: 12px 18px;
  border-radius: 14px;
  display: flex; align-items: center; gap: 12px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(10,46,90,.35);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
}
.save-bar.show { transform: translateX(-50%) translateY(0); }

/* agent name */
.av {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 900; color: #fff;
  flex-shrink: 0;
}
.an { font-size: 11px; font-weight: 700; color: #1A2F4E; }
.at {
  font-size: 8px; font-weight: 700; color: #fff;
  padding: 1px 4px; border-radius: 3px; display: inline-block; margin-top: 1px;
}
</style>
</head>
<body>
<div id="kib-topbar"></div>

<div class="ed-bar" style="margin-top:var(--topbar-h,56px);">
  <button class="wk-btn" onclick="prevWeek()">‹</button>
  <div class="wk-lbl" id="wk-lbl">Loading…</div>
  <button class="wk-btn" onclick="nextWeek()">›</button>
  <button class="tc on" onclick="goToday()" style="flex-shrink:0;">Today</button>
  <div class="tc-wrap" id="tc-wrap"></div>
</div>

<div id="kib-app" style="padding-top:0;">
  <div class="g-wrap" id="g-wrap">
    <div id="g-container" style="padding:40px;text-align:center;color:#7A8FAA;">
      <div class="kib-spin" style="margin:0 auto 10px;"></div>
      Loading schedule…
    </div>
  </div>
</div>

<div id="kib-bottomnav"></div>

<div class="save-bar" id="save-bar">
  <span id="save-msg" style="font-size:13px;font-weight:700;">0 changes</span>
  <button onclick="discardAll()" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">✕ Discard</button>
  <button onclick="saveAll()" id="save-btn" style="background:#00A89A;border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;">✓ Save All</button>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>
if (!Auth.guard()) throw 0;
const _acc = Auth.user()?.access||'';
if (!['management','wfm','admin'].includes(_acc)) {
  alert('Management access required.'); window.history.back(); throw 0;
}

const user = Auth.user();
Nav.init('schedule-edit');

let allData=null, allAgents=[], allDates=[];
let weekAnchor=U.today(), teamFilter='All';
let pending={};  // key:"agent|date" val:{agent,date,shift,orig}

/* ── ALL SHIFTS OPTION HTML ── */
function buildOptions(current) {
  const shifts = CFG.SHIFT_OPTIONS || [];
  const types  = CFG.DAY_TYPES    || [];
  let html = `<option value="">—</option>`;
  html += `<optgroup label="── Shifts ──">`;
  shifts.forEach(s => {
    html += `<option value="${s}" ${s===current?'selected':''}>${s}</option>`;
  });
  html += `</optgroup><optgroup label="── Off / Leave ──">`;
  types.forEach(t => {
    html += `<option value="${t.code}" ${t.code===current?'selected':''}>${t.code} — ${t.label}</option>`;
  });
  html += `</optgroup>`;
  return html;
}

/* ── GET COLORS ── */
function getStyle(code) {
  if (!code || code === 'OFF') return {bg:'#F1F5F9', color:'#6B7280'};
  const dt = (CFG.DAY_TYPES||[]).find(d=>d.code===code);
  if (dt) return {bg:dt.bg, color:dt.color};
  const def = CFG.getShiftDisplay && CFG.getShiftDisplay(code);
  if (def) return {bg:def.bg, color:def.color};
  // fallback by hour
  const h = parseInt(code.split(':')[0]||0);
  if (h < 10) return {bg:'#DBEAFE',color:'#1D4ED8'};
  if (h < 14) return {bg:'#CCFBF1',color:'#0F766E'};
  if (h < 17) return {bg:'#FEF3C7',color:'#B45309'};
  return {bg:'#EDE9FE',color:'#6D28D9'};
}

/* ── INIT ── */
async function init() {
  try {
    allData   = await API.getAll();
    Nav.setSyncStatus(true);
    allAgents = (allData.agents||[]).filter(a=>a.t!=='Management');
    allDates  = (allData.dates||[]).map(d=>U.normDate(d));
    buildTeamChips();
    renderGrid();
  } catch(e) {
    Nav.setSyncStatus(false);
    document.getElementById('g-container').innerHTML =
      `<div style="color:#EF4444;padding:40px;text-align:center;">
        ⚠ Failed to load<br>
        <button onclick="init()" style="margin-top:12px;padding:8px 16px;border-radius:8px;
          border:1.5px solid #EF4444;background:#fff;color:#EF4444;font-weight:700;cursor:pointer;">Retry</button>
      </div>`;
  }
}

/* ── TEAM CHIPS ── */
function buildTeamChips() {
  const teams = ['All', ...CFG.TEAMS.filter(t=>allAgents.some(a=>a.t===t))];
  document.getElementById('tc-wrap').innerHTML = teams.map(t=>
    `<div class="tc ${t===teamFilter?'on':''}" onclick="setTeam('${t}',this)">${t}</div>`
  ).join('');
}
function setTeam(t,el) {
  teamFilter=t;
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}

/* ── WEEK NAV ── */
function prevWeek() { weekAnchor=U.addDays(weekAnchor,-7); renderGrid(); }
function nextWeek() { weekAnchor=U.addDays(weekAnchor, 7); renderGrid(); }
function goToday()  { weekAnchor=U.today(); renderGrid(); }

function getWeekDates() {
  const w = U.getWeekDates(weekAnchor);
  if (!allDates.length) return w;
  return w.filter(d=>d>=allDates[0]&&d<=allDates[allDates.length-1]);
}

/* ── RENDER GRID ── */
function renderGrid() {
  const wd = getWeekDates();
  if (!wd.length) {
    document.getElementById('g-container').innerHTML =
      `<div style="padding:40px;text-align:center;color:#7A8FAA;">No schedule data for this week.</div>`;
    updateWkLbl(wd); return;
  }
  updateWkLbl(wd);

  let agents = allAgents;
  if (teamFilter!=='All') agents = agents.filter(a=>a.t===teamFilter);
  const today = U.today();
  const teams = [...new Set(agents.map(a=>a.t))];

  // Header
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let thead = `<thead><tr><th class="th-name">Agent</th>`;
  wd.forEach(d => {
    const dn = new Date(d+'T00:00:00');
    const isT=d===today, isW=U.isWeekend(d);
    thead += `<th class="${isT?'th-today':isW?'th-wknd':''}">
      <div>${days[dn.getDay()]}</div>
      <div style="font-size:13px;font-weight:900;color:${isT?'#fff':'rgba(255,255,255,.9)'};">${dn.getDate()}</div>
      <div style="font-size:8px;">${mons[dn.getMonth()]}</div>
    </th>`;
  });
  thead += `</tr></thead>`;

  // Body
  let tbody = '<tbody>';
  teams.forEach(team => {
    const members = agents.filter(a=>a.t===team);
    if (!members.length) return;
    const tc = CFG.TEAM_COLORS[team]||'#6B7280';
    tbody += `<tr class="grp-row"><td colspan="${wd.length+1}" style="color:${tc};">${team} · ${members.length}</td></tr>`;
    members.forEach(ag => {
      const name = ag.n||ag.name;
      const ac = U.avatarColor(name);
      tbody += `<tr>
        <td class="td-name">
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="av" style="background:${ac};">${U.initials(name)}</div>
            <div>
              <div class="an">${name}</div>
              <div class="at" style="background:${tc};">${team}</div>
            </div>
          </div>
        </td>`;
      wd.forEach(d => {
        const di = allDates.indexOf(d);
        const raw = (di>=0&&ag.sch ? ag.sch[di] : '')||'OFF';
        const pKey = `${name}|${d}`;
        const cur = pending[pKey] ? pending[pKey].shift : CFG.normalizeShiftCode(raw);
        const s = getStyle(cur);
        const isT = d===today, isW = U.isWeekend(d);
        const changed = !!pending[pKey];
        const ename = name.replace(/'/g,'\\x27').replace(/"/g,'\\x22');

        tbody += `<td style="${isW?'background:rgba(240,245,251,.5)':''}">
          <div class="cell-wrap">
            <select class="cell-sel ${changed?'changed':''} ${isT?'today-bg':''}"
              style="background:${s.bg};color:${s.color};"
              data-agent="${ename.replace(/"/g,'&quot;')}"
              data-date="${d}"
              data-orig="${CFG.normalizeShiftCode(raw)}"
              onchange="onCellChange(this)">
              ${buildOptions(cur)}
            </select>
          </div>
        </td>`;
      });
      tbody += '</tr>';
    });
  });
  tbody += '</tbody>';

  document.getElementById('g-container').innerHTML = `<table class="g-tbl">${thead}${tbody}</table>`;
}

function updateWkLbl(wd) {
  if (!wd||!wd.length) { document.getElementById('wk-lbl').textContent='No data'; return; }
  const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const f=new Date(wd[0]+'T00:00:00'), l=new Date(wd[wd.length-1]+'T00:00:00');
  document.getElementById('wk-lbl').textContent = `${f.getDate()} ${m[f.getMonth()]} – ${l.getDate()} ${m[l.getMonth()]}`;
}

/* ── CELL CHANGE ── */
function onCellChange(sel) {
  const agentName = sel.dataset.agent;
  const date      = sel.dataset.date;
  const orig      = sel.dataset.orig;
  const newCode   = sel.value;
  if (!newCode) return;

  const pKey = `${agentName}|${date}`;
  if (newCode === orig) {
    delete pending[pKey];
    sel.classList.remove('changed');
  } else {
    pending[pKey] = { agent:agentName, date, shift:newCode, orig };
    sel.classList.add('changed');
  }

  // Update cell colors
  const s = getStyle(newCode);
  sel.style.background = s.bg;
  sel.style.color      = s.color;

  updateSaveBar();
}

/* ── SAVE BAR ── */
function updateSaveBar() {
  const n = Object.keys(pending).length;
  document.getElementById('save-msg').textContent = `${n} unsaved change${n!==1?'s':''}`;
  document.getElementById('save-bar').classList.toggle('show', n>0);
}

function discardAll() {
  if (!Object.keys(pending).length) return;
  if (!confirm('Discard all unsaved changes?')) return;
  pending = {};
  updateSaveBar();
  renderGrid();
}

async function saveAll() {
  const changes = Object.values(pending);
  if (!changes.length) return;
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Saving…';
  try {
    await API.bulkUpdateShifts(changes, user.name);
    // Update local cache
    changes.forEach(ch => {
      const ag  = allAgents.find(a=>(a.n||a.name)===ch.agent);
      const idx = allDates.indexOf(ch.date);
      if (ag&&idx>=0&&ag.sch) ag.sch[idx] = ch.shift;
    });
    pending = {};
    updateSaveBar();
    renderGrid();
    API.clearCache('getAll');
    U.toast(`${changes.length} change${changes.length>1?'s':''} saved ✓`, 'ok');
  } catch(e) {
    Nav.setSyncStatus(false);
    U.toast('Save failed — check n8n', 'err');
  } finally {
    btn.disabled=false; btn.textContent='✓ Save All';
  }
}

init();
</script>
</body>
</html>
