<style>
:root{
  --navy:#060F24;--navy-2:#0D1B3E;--blue:#1877C5;
  --green:#0EA472;--red:#E5383B;--amber:#F4A523;
  --bg:#F0F4F9;--card:#FFFFFF;--border:#E4EAF3;
  --t1:#0A1628;--t2:#4A5568;--t3:#8A9BB0;
  --sb:var(--navy);--sb-text:rgba(255,255,255,0.5);
  --r-md:10px;--r-lg:14px;
  --sh-sm:0 1px 4px rgba(6,15,36,.06),0 2px 8px rgba(6,15,36,.04);
  --sh-md:0 4px 16px rgba(6,15,36,.1);
  --ease:.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform var(--ease);}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-kib{font-size:11px;font-weight:800;background:var(--blue);color:#fff;border-radius:6px;padding:3px 8px;letter-spacing:.5px;display:inline-block;}
.logo-name{font-size:13px;font-weight:700;color:#fff;margin-top:8px;}
.logo-sub{font-size:9px;color:var(--sb-text);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);color:var(--sb-text);font-size:12px;font-weight:500;text-decoration:none;transition:all var(--ease);margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(24,119,197,.25);color:#fff;font-weight:700;}
.sidebar-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.user-name{font-size:12px;font-weight:600;color:#fff;}
.user-role{font-size:10px;color:var(--sb-text);}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--sb-text);margin-left:auto;padding:4px;}
.logout-btn:hover{color:#fff;}
.sidebar-toggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--t2);}
.main-content{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.breadcrumb{font-size:14px;font-weight:700;color:var(--t1);flex:1;}
.page-content{padding:24px;flex:1;max-width:680px;margin:0 auto;width:100%;}
.add-card{background:var(--card);border-radius:var(--r-lg);border:1.5px solid var(--border);box-shadow:var(--sh-sm);padding:18px 20px;margin-bottom:24px;transition:border-color .2s,box-shadow .2s;}
.add-card:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,119,197,.08);}
.add-top{display:flex;align-items:center;gap:12px;}
.add-circle{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;transition:border-color .2s;}
.add-card:focus-within .add-circle{border-color:var(--blue);}
#addInput{flex:1;border:none;outline:none;font-size:15px;font-weight:500;color:var(--t1);font-family:inherit;background:transparent;}
#addInput::placeholder{color:#CBD5E1;}
.add-bottom{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.add-bottom label{font-size:12px;font-weight:600;color:var(--t3);}
#addDate{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--t2);outline:none;background:var(--bg);}
#addDate:focus{border-color:var(--blue);}
#addNote{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--t2);outline:none;background:var(--bg);}
#addNote:focus{border-color:var(--blue);}
#addNote::placeholder{color:#CBD5E1;}
.btn-add{background:linear-gradient(135deg,#1E3A6E,#1A4A7A);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.filter-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.f-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.f-btn.on{background:var(--navy-2);color:#fff;border-color:var(--navy-2);}
.f-btn:hover:not(.on){border-color:var(--blue);color:var(--blue);}
.group-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.group-label::after{content:'';flex:1;height:1px;background:var(--border);}
.todo-item{background:var(--card);border-radius:var(--r-lg);border:1.5px solid var(--border);margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;padding:14px 16px;transition:all .2s;position:relative;}
.todo-item:hover{border-color:#CBD5E1;box-shadow:var(--sh-sm);}
.todo-item.done{opacity:.55;}
.todo-item.overdue{border-left:3px solid var(--red);}
.todo-item.due-today{border-left:3px solid var(--amber);}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.chk:hover{border-color:var(--green);background:#ECFDF5;}
.chk.chk-done{background:var(--green);border-color:var(--green);}
.todo-body{flex:1;min-width:0;}
.todo-title{font-size:14px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:3px;}
.todo-title.done-txt{text-decoration:line-through;color:var(--t3);}
.todo-note{font-size:12px;color:var(--t3);margin-bottom:4px;}
.todo-date{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
.date-ok{background:#F0FDF4;color:#166534;}
.date-today{background:#FFFBEB;color:#92400E;}
.date-overdue{background:#FEF2F2;color:#991B1B;}
.todo-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;flex-shrink:0;}
.todo-item:hover .todo-actions{opacity:1;}
.act-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;color:var(--t3);font-size:13px;transition:all .2s;}
.act-btn:hover{background:#F1F5F9;color:var(--t1);}
.act-del:hover{background:#FEF2F2;color:var(--red);}
.edit-input{width:100%;border:none;outline:none;font-size:14px;font-weight:600;color:var(--t1);font-family:inherit;background:transparent;border-bottom:1.5px solid var(--blue);padding-bottom:2px;}
.edit-date{padding:3px 8px;border:1.5px solid var(--blue);border-radius:6px;font-size:11px;font-family:inherit;outline:none;}
.stats-strip{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--t2);}
.stat-pill span{font-weight:800;color:var(--t1);}
.empty{text-align:center;padding:48px 20px;color:var(--t3);}
.notif-bell{position:relative;background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;display:flex;align-items:center;}
.notif-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.notif-badge.hidden{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}.sidebar-toggle{display:flex;}}

/* ── UNIVERSAL MOBILE ─────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform .25s ease; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.35); }
  .sidebar-toggle { display: flex !important; align-items: center; justify-content: center; }
  .main-content { margin-left: 0 !important; }
  .top-bar { padding: 0 14px; gap: 8px; }
  .page-content { padding: 14px !important; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .page-title { font-size: 18px; }
  .breadcrumb { font-size: 13px; }
  .search-bar { display: none; }
  .form-row, .form-row-3 { grid-template-columns: 1fr !important; }
  .form-card { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
  .kanban-board { grid-template-columns: 1fr !important; }
  .kanban-col { min-width: 0 !important; }
  .kanban-wrap { overflow-x: unset; }
  .stats-row, .bottom-grid, .chart-grid { grid-template-columns: 1fr !important; }
  .btn { padding: 8px 14px; font-size: 12px; }
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .modal-inner, [style*="max-width:660px"], [style*="max-width: 660px"] { max-width: 100% !important; margin: 8px !important; border-radius: 14px !important; }
  #taskModal { padding: 8px !important; }
  .filter-bar, .filter-row { gap: 6px; flex-wrap: wrap; }
  .filter-btn, .f-btn { font-size: 11px; padding: 5px 11px; }
  .add-bottom { flex-wrap: wrap; }
  .todo-actions { opacity: 1 !important; }
  .stats-strip { flex-wrap: wrap; gap: 8px; }
  .rec-btn { padding: 10px 6px !important; font-size: 12px !important; }
  .sidebar-overlay { display: block; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr !important; }
  .page-content { padding: 10px !important; }
  .form-card { padding: 14px; }
  .top-bar { height: 50px; }
  .stats-strip { gap: 6px; }
  .stat-pill { font-size: 11px; padding: 5px 10px; }
}
.sidebar-overlay { display: none; }
@media (max-width: 768px) {
  #sidebarOverlay { display: none; }
  .sidebar.open ~ #sidebarOverlay, #sidebarOverlay.visible { display: block !important; }
}


/* ═══════════════════════════════════════════════════════
   MOBILE UX IMPROVEMENTS — Full Access on Mobile
   ═══════════════════════════════════════════════════════ */

/* Base touch targets */
button, .btn, .nav-item, a.nav-item, .k-card, .task-row {
  min-height: 44px;
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(0,0,0,0.05);
}

/* Prevent zoom on input focus */
input, select, textarea {
  font-size: 16px !important;
}

/* Smooth scrolling */
* { -webkit-overflow-scrolling: touch; }

/* ── PHONE (≤480px) ───────────────────────────────── */
@media (max-width: 480px) {

  /* Sidebar */
  .sidebar { width: 85vw !important; max-width: 300px; }
  .main-content { margin-left: 0 !important; }

  /* Top bar */
  .top-bar { padding: 0 10px !important; height: 52px !important; }
  .breadcrumb { font-size: 13px !important; }
  .search-bar { display: none !important; }

  /* Page content */
  .page-content { padding: 10px !important; }

  /* KPI grids — 2 columns always */
  .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
  .kpi-card { padding: 12px 10px !important; }
  .kpi-value { font-size: 20px !important; }
  .kpi-label { font-size: 10px !important; }

  /* Page headers */
  .page-header { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }
  .page-actions { width: 100% !important; justify-content: space-between !important; }

  /* Cards */
  .card, .kpi-card, .shift-card { border-radius: 10px !important; }

  /* Modals — full screen on phone */
  #taskModal, #trainingModal, #newTaskModal, #hoModal {
    padding: 0 !important;
    align-items: flex-end !important;
  }
  #taskModal > div, #trainingModal > div, #newTaskModal > div, #hoModal > div {
    border-radius: 20px 20px 0 0 !important;
    max-height: 92vh !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  #taskModalBody, #cardBody {
    max-height: calc(92vh - 120px) !important;
  }

  /* Kanban — horizontal scroll */
  .kanban-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; padding-bottom: 16px !important; }
  .kanban-board { display: flex !important; gap: 10px !important; min-width: max-content !important; }
  .kanban-col { min-width: 260px !important; width: 260px !important; }

  /* Tables — horizontal scroll */
  .table-card, table { overflow-x: auto !important; display: block !important; }
  thead, tbody, tr { display: table !important; width: 100% !important; table-layout: fixed !important; }
  table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; }

  /* Forms */
  .form-row { flex-direction: column !important; }
  .form-group { width: 100% !important; }
  input[type=date], input[type=number], select { width: 100% !important; }

  /* Buttons */
  .btn { padding: 10px 16px !important; font-size: 12px !important; }
  .btn-primary, .btn-post { min-height: 44px !important; }

  /* Training cards */
  .plan-card { padding: 14px !important; }
  .plan-header { flex-direction: column !important; gap: 8px !important; }

  /* Handover */
  .shifts-grid { grid-template-columns: 1fr !important; }
  .kpi-row { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }

  /* Sales */
  .sales-grid { grid-template-columns: 1fr !important; }
  .chart-grid { grid-template-columns: 1fr !important; }

  /* Notifications */
  .notif-list { padding: 0 !important; }

  /* Tab bars — horizontal scroll */
  .tab-bar, [class*="tab-bar"] {
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch !important;
    flex-wrap: nowrap !important;
    scrollbar-width: none !important;
  }
  .tab-bar::-webkit-scrollbar { display: none !important; }

  /* Hide non-essential columns in tables */
  .col-hide-mobile { display: none !important; }

  /* Floating action button for New Task */
  .fab-new {
    position: fixed !important;
    bottom: 20px !important;
    right: 20px !important;
    width: 56px !important;
    height: 56px !important;
    border-radius: 50% !important;
    box-shadow: 0 4px 20px rgba(0,0,0,.3) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 24px !important;
    z-index: 200 !important;
  }
}

/* ── TABLET (481–768px) ───────────────────────────── */
@media (min-width: 481px) and (max-width: 768px) {
  .main-content { margin-left: 0 !important; }
  .kpi-grid { grid-template-columns: repeat(3, 1fr) !important; }
  .kanban-wrap { overflow-x: auto !important; }
  .kanban-board { display: flex !important; min-width: max-content !important; }
  .kanban-col { min-width: 240px !important; }
  .form-row { flex-wrap: wrap !important; }
  .page-content { padding: 16px !important; }
}


/* ── MOBILE BOTTOM NAVIGATION ──────────────────────── */
.mobile-bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #0D1B3E;
  border-top: 1px solid rgba(255,255,255,.1);
  z-index: 200;
  padding: 6px 0 env(safe-area-inset-bottom, 6px);
  flex-direction: row;
  justify-content: space-around;
  align-items: center;
}
.mbn-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: rgba(255,255,255,.5); text-decoration: none;
  padding: 6px 12px; border-radius: 8px;
  font-size: 10px; font-weight: 600;
  transition: color .2s;
  min-width: 52px; text-align: center;
}
.mbn-item.active, .mbn-item:active { color: #fff; }
.mbn-item svg { flex-shrink: 0; }
@media (max-width: 768px) {
  .mobile-bottom-nav { display: flex !important; }
  .main-content { padding-bottom: 70px !important; }
  /* Hide sidebar on mobile - use bottom nav instead */
  .sidebar { display: none !important; }
  .sidebar.open { display: flex !important; }
}

</style>
</head>

    <button class="notif-bell" onclick="loadBell()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><div class="notif-badge hidden" id="notifBadge"></div></button>
  </header>
  <div class="page-content">
    <!-- Add box -->
    <div class="add-card">
      <div class="add-top">
        <div class="add-circle"></div>
        <input id="addInput" type="text" placeholder="What do you need to do?" autocomplete="off" onkeydown="if(event.key==='Enter')addTodo()">
      </div>
      <div class="add-bottom" id="addBottom">
        <label>📅</label>
        <input id="addDate" type="date">
        <input id="addNote" type="text" placeholder="Add a note...">

    <!-- Stats -->

    <!-- Filters -->
    <div class="filter-row">
      <button class="f-btn on" data-f="pending" onclick="setF(this)">All Pending</button>
      <button class="f-btn" data-f="today"   onclick="setF(this)">📅 Today</button>
      <button class="f-btn" data-f="overdue" onclick="setF(this)">🔴 Overdue</button>
      <button class="f-btn" data-f="done"    onclick="setF(this)">✅ Done</button>
      <button class="f-btn" data-f="all"     onclick="setF(this)">All</button>
    </div>
    <!-- List -->
    <div id="todoList"><div style="padding:32px;text-align:center;color:#94A3B8"><div style="width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:#1A4A7A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px"></div>Loading...</div></div>
  </div>
</div>
<script>
var API_BASE='https://n8n.kib-cc-wfm.com/webhook';
var SES_KEY='kib_ops_session';
var API={
  _t:function(){var s=AUTH.getSession();return s?s.session_token:null;},
  post:async function(action,body){
    var path=action.replace(/_/g,'-');
    var url=API_BASE+'/kib/'+path;
    var p=Object.assign({},body||{});
    var t=this._t();if(t)p.session_token=t;
    var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    var txt=await r.text();var d;
    try{d=JSON.parse(txt);}catch(e){throw new Error('Server '+r.status+': '+(txt||'empty').slice(0,120));}
    if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:d.message||'API error');
    return d.data;
  },
  get:async function(action,params){return this.post(action,params||{});}
};
var AUTH={
  getSession:function(){try{var s=JSON.parse(localStorage.getItem(SES_KEY));return s&&new Date(s.expires_at)>new Date()?s:null;}catch(e){return null;}},
  requireAuth:function(){if(!this.getSession())window.location.href='/cc.task.mane/login.html';},
  logout:function(){localStorage.removeItem(SES_KEY);window.location.href='/cc.task.mane/login.html';},
  getUserId:function(){var s=this.getSession();return s?s.user_id:null;}
};
var UTILS={
  esc:function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');},
  ini:function(n){return String(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();},
  today:function(){return new Date(Date.now()+3*3600000).toISOString().slice(0,10);},
  toast:function(msg,type){var c={success:'#0EA472',error:'#E5383B',info:'#1877C5'};var t=document.createElement('div');t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0D1B3E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;border-left:3px solid '+(c[type]||c.info)+';box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:340px;font-family:inherit;animation:fadeIn .25s ease';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);},
  setUser:function(s){if(!s)return;var i=document.getElementById('avatarInitials'),n=document.getElementById('sidebarName'),r=document.getElementById('sidebarRole');if(i)i.textContent=this.ini(s.full_name);if(n)n.textContent=s.display_name||s.full_name.split(' ')[0];if(r)r.textContent=s.role;document.querySelectorAll('[data-roles]').forEach(function(el){if(el.getAttribute('data-roles').split(',').map(function(x){return x.trim();}).indexOf(s.role)===-1)el.style.display='none';});}
};
AUTH.requireAuth();

// ═══════════════════════════════════════════════════════════════════
// ── LOCAL CACHE (stale-while-revalidate) ───────────────────────────
// Stores API responses in sessionStorage.
// First load: returns cache instantly (if <5min old), fetches fresh in BG.
// After 5min: fetches fresh, shows old while waiting.
// Auto-refreshes in background (2-5min depending on page).
// ═══════════════════════════════════════════════════════════════════
var CACHE = {
  _TTL: 600000,        // 5 min max age before forced refresh
  _BG:  120000,        // 2min background refresh interval (per-page varies)
  _pfx: 'kib_cache_',  // storage key prefix
  _timers: {},

  // Build a cache key from action + params
  _key: function(action, params) {
    var p = Object.keys(params||{}).sort().map(function(k){return k+'='+params[k];}).join('&');
    return this._pfx + action + (p ? '_' + p : '');
  },

  // Save data to sessionStorage with timestamp
  set: function(action, params, data) {
    try {
      var key = this._key(action, params);
      sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data: data }));
    } catch(e) {} // ignore storage errors (private mode etc)
  },

  // Get cached data. Returns {data, stale} or null
  get: function(action, params) {
    try {
      var key = this._key(action, params);
      var raw = sessionStorage.getItem(key);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      return { data: obj.data, stale: (Date.now() - obj.ts) > this._TTL };
    } catch(e) { return null; }
  },

  // Clear a specific action from cache (use after mutations)
  bust: function(action) {
    try {
      for (var i = sessionStorage.length - 1; i >= 0; i--) {
        var k = sessionStorage.key(i);
        if (k && k.indexOf(this._pfx + action) === 0) {
          sessionStorage.removeItem(k);
        }
      }
    } catch(e) {}
  },

  // Bust all task-related caches (after create/update/cancel)
  bustTasks: function() {
    this.bust('tasks_list');
    this.bust('tasks_detail');
    this.bust('dashboard');
  },

  // Bust all training caches
  bustTraining: function() {
    this.bust('training_list');
    this.bust('training_detail');
    this.bust('dashboard');
  },

  // Clear everything
  clear: function() {
    try {
      var keys = [];
      for (var i = 0; i < sessionStorage.length; i++) {
        var k = sessionStorage.key(i);
        if (k && k.indexOf(this._pfx) === 0) keys.push(k);
      }
      keys.forEach(function(k){ sessionStorage.removeItem(k); });
    } catch(e) {}
  }
};

// Extend API.get to use cache automatically
var _origAPIGet = API.get.bind(API);
API.get = async function(action, params) {
  // Actions that should NOT be cached (always fresh)
  var noCache = ['login','notif_list','notif_read','notif_read_all'];
  if (noCache.indexOf(action) !== -1) {
    return _origAPIGet(action, params);
  }

  var cached = CACHE.get(action, params);

  if (cached && !cached.stale) {
    // Fresh cache — return immediately, refresh in background silently
    _origAPIGet(action, params).then(function(fresh) {
      CACHE.set(action, params, fresh);
    }).catch(function(){});
    return cached.data;
  }

  if (cached && cached.stale) {
    // Stale cache — return old data immediately so UI shows instantly
    // Then fetch fresh and update (next load will be fast)
    _origAPIGet(action, params).then(function(fresh) {
      CACHE.set(action, params, fresh);
    }).catch(function(){});
    return cached.data;
  }

  // No cache at all — fetch fresh and cache it
  var fresh = await _origAPIGet(action, params);
  CACHE.set(action, params, fresh);
  return fresh;
};

// Extend API.post to bust relevant caches after mutations
var _origAPIPost = API.post.bind(API);
API.post = async function(action, body) {
  var result = await _origAPIPost(action, body);
  // Bust caches based on action
  var taskActions = ['tasks_create','tasks_update','subtask_mark','task_delegate',
                     'task_ext_request','task_ext_review'];
  var trainActions = ['training_create','training_mark','training_comment',
                      'training_ext_request','training_ext_review'];
  var handoverActions = ['handover_create','handover_update'];
  var salesActions = ['sales_entry','sales_mtd_update'];
  var todoActions = ['ptodo_add','ptodo_update','ptodo_delete'];

  if (taskActions.indexOf(action) !== -1)    CACHE.bustTasks();
  if (trainActions.indexOf(action) !== -1)   CACHE.bustTraining();
  if (handoverActions.indexOf(action) !== -1){ CACHE.bust('handover_dashboard'); CACHE.bust('handover_list'); CACHE.bust('dashboard'); }
  if (salesActions.indexOf(action) !== -1)   { CACHE.bust('sales_dashboard'); CACHE.bust('dashboard'); }
  if (todoActions.indexOf(action) !== -1)    { CACHE.bust('ptodo_list'); }

  return result;
};

var S=AUTH.getSession()||{};
UTILS.setUser(S);
document.getElementById('pageTitle').textContent=(S.display_name||S.full_name||'My')+String.fromCharCode(8217)+'s To-Do';
var _sb=document.getElementById('sidebar'),_ov=document.getElementById('sidebarOverlay');document.getElementById('sidebarToggle').addEventListener('click',function(){_sb.classList.toggle('open');if(_ov)_ov.style.display=_sb.classList.contains('open')?'block':'none';});
document.getElementById('addDate').min=UTILS.today();
async function loadBell(){try{var d=await API.get('notif_list',{limit:'5',unread_only:'true'});var nb=document.getElementById('notifBadge');if(nb){if(d.unread_count>0){nb.textContent=d.unread_count;nb.classList.remove('hidden');}else nb.classList.add('hidden');}}catch(e){}}
var allTodos=[],curF='pending';
function handleToggle(el){var id=el.dataset.tid;var isDone=el.dataset.done==='true';toggleDone(id,isDone);}
async function loadTodos(){try{var d=await API.get('ptodo_list',{});allTodos=d.todos||[];render();}catch(ex){document.getElementById('todoList').innerHTML='<div style="padding:32px;text-align:center;color:#EF4444">'+UTILS.esc(ex.message)+'</div>';}}
function isOverdue(dt){return dt&&dt<UTILS.today();}
function isToday(dt){return dt&&dt===UTILS.today();}
function renderStats(){
  var pend=allTodos.filter(function(t){return t.status!=='Done';});
  var done=allTodos.filter(function(t){return t.status==='Done';});
  var ov=allTodos.filter(function(t){return isOverdue(t.due_date)&&t.status!=='Done';});
  document.getElementById('statsStrip').innerHTML=
    '<div class="stat-pill"><span>'+pend.length+'</span> pending</div>'+
    (ov.length?'<div class="stat-pill" style="color:#EF4444;border-color:#FECACA"><span style="color:#EF4444">'+ov.length+'</span> overdue</div>':'')+
    '<div class="stat-pill" style="color:#059669;border-color:#A7F3D0"><span style="color:#059669">'+done.length+'</span> done</div>';
}
function setF(btn){document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');curF=btn.dataset.f;render();}
function render(){
  renderStats();
  var filtered=allTodos.filter(function(t){
    if(curF==='pending')return t.status!=='Done';
    if(curF==='done')return t.status==='Done';
    if(curF==='today')return isToday(t.due_date)&&t.status!=='Done';
    if(curF==='overdue')return isOverdue(t.due_date)&&t.status!=='Done';
    return true;
  });
  if(filtered.length===0){
    var msgs={pending:'Nothing pending — you are all caught up!',done:'No completed items yet',today:'Nothing due today',overdue:'No overdue items!',all:'No to-dos yet. Add one above!'};
    document.getElementById('todoList').innerHTML='<div class="empty"><div style="font-size:44px;margin-bottom:12px">'+(curF==='pending'||curF==='overdue'?'&#127881;':'&#128218;')+'</div><div style="font-size:15px;font-weight:700;color:var(--t2);margin-bottom:6px">'+(msgs[curF]||'')+'</div></div>';
    return;
  }
  var ov=filtered.filter(function(t){return isOverdue(t.due_date)&&t.status!=='Done';});
  var td=filtered.filter(function(t){return isToday(t.due_date)&&t.status!=='Done';});
  var up=filtered.filter(function(t){return !isOverdue(t.due_date)&&!isToday(t.due_date)&&t.status!=='Done';});
  var dn=filtered.filter(function(t){return t.status==='Done';});
  var html='';
  if(ov.length)html+=group('🔴 Overdue',ov);
  if(td.length)html+=group('⏰ Today',td);
  if(up.length)html+=group('📅 Upcoming',up);
  if(dn.length)html+=group('✅ Done',dn);
  document.getElementById('todoList').innerHTML=html;
}
function group(label,items){return '<div class="group-label">'+label+'<span style="background:#E2E8F0;color:#64748B;font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;text-transform:none;letter-spacing:0">'+items.length+'</span></div>'+items.map(card).join('');}
function card(t){
  var done=t.status==='Done';
  var ov=isOverdue(t.due_date)&&!done;
  var td=isToday(t.due_date)&&!done;
  var cls='todo-item'+(done?' done':'')+(ov?' overdue':td?' due-today':'');
  var dp='';
  if(t.due_date){var dl=ov?'date-overdue':td?'date-today':'date-ok';var ic=ov?'🔴':td?'⏰':'📅';dp='<div style="margin-top:5px"><span class="todo-date '+dl+'">'+ic+' '+t.due_date+'</span></div>';}
  return '<div class="'+cls+'" id="item_'+t.todo_id+'" style="animation:fadeIn .2s ease">'
    +'<div class="chk'+(done?' chk-done':'')+'" data-tid="'+t.todo_id+'" data-done="'+done+'" onclick="handleToggle(this)">'+(done?'<svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>'
    +'<div class="todo-body"><div class="todo-title'+(done?' done-txt':'')+'">'+UTILS.esc(t.title)+'</div>'+(t.note?'<div class="todo-note">'+UTILS.esc(t.note)+'</div>':'')+dp+'</div>'
    +'<div class="todo-actions"><button class="act-btn" data-tid="'+t.todo_id+'" onclick="startEdit(this.dataset.tid)">✏️</button><button class="act-btn act-del" data-tid="'+t.todo_id+'" onclick="deleteTodo(this.dataset.tid)">🗑</button></div>'
    +'</div>';
}
async function addTodo(){
  var title=(document.getElementById('addInput').value||'').trim();
  if(!title){document.getElementById('addInput').focus();return;}
  var date=document.getElementById('addDate').value||'';
  var note=(document.getElementById('addNote').value||'').trim();
  var btn=document.querySelector('.btn-add');btn.disabled=true;btn.textContent='Adding...';
  try{
    var d=await API.post('ptodo_add',{title:title,due_date:date,note:note});
    allTodos.unshift(d);
    document.getElementById('addInput').value='';
    document.getElementById('addDate').value='';
    document.getElementById('addNote').value='';
    document.getElementById('addBottom').style.display='none';
    if(curF==='done'){document.querySelector('[data-f="pending"]').click();}else render();
    UTILS.toast('Added!','success');
  }catch(ex){UTILS.toast('Error: '+ex.message,'error');}
  btn.disabled=false;btn.textContent='Add';
}
async function toggleDone(id,isDone){
  var ns=isDone?'Pending':'Done';
  var t=allTodos.find(function(x){return x.todo_id===id;});if(t)t.status=ns;render();
  try{await API.post('ptodo_update',{todo_id:id,status:ns});}catch(ex){UTILS.toast('Error: '+ex.message,'error');if(t)t.status=isDone?'Done':'Pending';render();}
}
function startEdit(id){
  var t=allTodos.find(function(x){return x.todo_id===id;});if(!t)return;
  var el=document.getElementById('item_'+id);if(!el)return;
  el.innerHTML='<div class="chk" style="margin-top:4px"></div><div class="todo-body" style="display:flex;flex-direction:column;gap:8px">'
    +'<input class="edit-input" id="et_'+id+'" value="'+UTILS.esc(t.title)+'" placeholder="Task title">'
    +'<div style="display:flex;gap:8px;align-items:center"><input class="edit-date" id="ed_'+id+'" type="date" value="'+(t.due_date||'')+'"><input class="edit-input" id="en_'+id+'" value="'+UTILS.esc(t.note||'')+'" placeholder="Note..." style="font-size:12px;font-weight:500"></div>'
    +'<div style="display:flex;gap:8px"><button data-sid="'+id+'" onclick="saveEdit(this.dataset.sid)" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Save</button>'
    +'<button onclick="render()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit">Cancel</button></div></div>';
  document.getElementById('et_'+id).focus();
}
async function saveEdit(id){
  var title=(document.getElementById('et_'+id).value||'').trim();
  var date=document.getElementById('ed_'+id).value||'';
  var note=(document.getElementById('en_'+id).value||'').trim();
  if(!title){UTILS.toast('Title cannot be empty','error');return;}
  var t=allTodos.find(function(x){return x.todo_id===id;});if(t){t.title=title;t.due_date=date;t.note=note;}
  render();
  try{await API.post('ptodo_update',{todo_id:id,title:title,due_date:date,note:note});UTILS.toast('Saved','success');}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');loadTodos();}
}
async function deleteTodo(id){
  if(!confirm('Delete this to-do?'))return;
  allTodos=allTodos.filter(function(t){return t.todo_id!==id;});render();
  try{await API.post('ptodo_delete',{todo_id:id});}catch(ex){UTILS.toast('Error: '+ex.message,'error');loadTodos();}
}
loadTodos();loadBell();

// Background data refresh every 30s (uses cache — no visible loading)
(function() {
  var _bgKey = '_bg_todo';
  if(window[_bgKey]) clearInterval(window[_bgKey]);
  window[_bgKey] = setInterval(function(){
    loadTodos();
  }, 300000);
})();
</script>
