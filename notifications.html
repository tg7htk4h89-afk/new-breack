<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0A4A8A">
<title>KIB WFM — Notifications</title>
<link rel="stylesheet" href="css/kib.css">
</head>
<body>
<div id="kib-topbar"></div>
<div id="kib-app">
  <div id="user-strip-container"></div>
  <div class="page-content">
    <div class="card" style="margin-top:12px;">
      <div class="card-header">
        <div class="card-title">🔔 Notifications</div>
        <button class="btn btn-xs btn-outline" onclick="markAllRead()">Mark all read</button>
      </div>
      <div id="notif-list" class="card-body">
        <div class="skel" style="height:52px;margin-bottom:8px;border-radius:8px;"></div>
        <div class="skel" style="height:52px;margin-bottom:8px;border-radius:8px;"></div>
        <div class="skel" style="height:52px;border-radius:8px;"></div>
      </div>
    </div>
  </div>
</div>
<div id="kib-bottomnav"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>
if (!Auth.guard()) throw 0;

const user = Auth.user();
Nav.init('notifications');
document.getElementById('user-strip-container').innerHTML = Nav.renderUserStrip();

async function init() {
  try {
    const data = await API.getNotifications(user.name);
    const notifs = data?.notifications || [];
    if (!notifs.length) {
      document.getElementById('notif-list').innerHTML =
        `<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-msg">No notifications</div><div class="empty-sub">You're all caught up!</div></div>`;
      return;
    }
    const typeIcon = { swap:'🔄', leave:'🏖', schedule:'📅', system:'⚙️', info:'ℹ️' };
    document.getElementById('notif-list').innerHTML = notifs.map(n => `
      <div class="row-item" style="${n.read?'':'background:rgba(13,92,166,.03);'}">
        <div class="row-icon" style="background:${n.read?'var(--bg)':'rgba(13,92,166,.08)'};">${typeIcon[n.type]||'🔔'}</div>
        <div class="row-info">
          <div class="row-title" style="${n.read?'':'font-weight:800;'}">${n.message||n.title||'Notification'}</div>
          <div class="row-meta">From: ${n.from||'System'} · ${U.timeAgo(n.ts||n.created_at||'')}</div>
        </div>
        ${!n.read?`<div style="width:8px;height:8px;border-radius:50%;background:var(--navy);flex-shrink:0;"></div>`:''}
      </div>`).join('');
  } catch(e) { U.toast('Failed to load notifications','err'); }
}

async function markAllRead() {
  try {
    await API.markNotificationsRead(user.name);
    init();
  } catch(e) { U.toast('Failed','err'); }
}

init();
</script>
</body>
</html>
